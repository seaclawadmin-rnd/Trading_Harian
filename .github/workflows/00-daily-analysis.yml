name: Run Saham Syariah Screener

on:
  schedule:
    # Menggunakan standar waktu UTC. Jam 09:15 UTC sama dengan jam 16:15 WIB (Selesai Jam Bursa)
    # Berjalan otomatis setiap hari Senin sampai Jumat
    - cron: '15 9 * * 1-5'
  workflow_dispatch: # CRUCIAL: Baris ini yang memunculkan tombol manual "Run workflow"

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode dari Github
        uses: actions/checkout@v4

      - name: Setup Environment Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Modul Saham & Telegram
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Eksekusi Mesin Kuantitatif
        env:
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py